[env:esp32-2432S028R]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino

board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.partitions = partitions_ota.csv

; ── PSRAM (APS6404L-3SQR on GPIO16/17) ──────────────────────
; GPIO16 = PSRAM CS, GPIO17 = PSRAM CLK (RGB LED удалён)
board_build.psram = enabled
; Flash на плате работает в DIO режиме → dio_qspi (DIO flash + QSPI PSRAM)
; qio_qspi использовался ошибочно — требует QIO flash, у CYD flash = DIO
board_build.arduino.memory_type = dio_qspi

build_unflags =
    -std=gnu++11
    -std=gnu++14

build_flags =
    -O2
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -mfix-esp32-psram-cache-strategy=nops
    ; loopTask по умолчанию = 8KB — NES эмулятор переполняет стек при старте.
    ; Увеличиваем до 32KB. PSRAM даёт запас памяти — можно себе позволить.
    -DARDUINO_LOOP_STACK_SIZE=32768
    ; ── nofrendo flags ───────────────────────────────────────────
    -DNOFRENDO
    -I include
    -I src
    -I src/emulator
    -I src/emulator/nofrendo
    -I src/emulator/nofrendo/nes
    -I src/emulator/nofrendo/cpu
    -I src/emulator/nofrendo/sndhrdw
    -I src/emulator/nofrendo/mappers
    -I src/emulator/nofrendo/libsnss
    -Wno-missing-field-initializers
    -Wno-write-strings
    -Wno-unused-parameter
    -Wno-sign-compare
    -Wno-implicit-function-declaration

lib_deps =
    lovyan03/LovyanGFX@^1.1.9
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_src_filter =
    +<*>
